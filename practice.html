<!DOCTYPE html>
<html>
<head>
<title>Practice</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="container">

<h2>Practice</h2>

<div class="stats">
    <span>⚡ WPM: <b id="wpm">0</b></span>
    <span>🎯 Accuracy: <b id="accuracy">100</b>%</span>
    <span>📝 Done: <b id="done">0</b></span>
</div>

<div id="sentence" class="sentence"></div>

<input id="input" placeholder="Type and press Enter">

<div class="progress">
    <div id="bar"></div>
</div>

</div>

<div id="popup" class="popup hidden">
    <h2>🔥 Goal Completed!</h2>
    <button onclick="goBack()">Back</button>
</div>

<script src="script.js"></script>
</body>
</html>

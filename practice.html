<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="practice-container">

    <div class="stats">
        <span>⏱ <span id="time">0</span>s</span>
        <span>⚡ WPM: <span id="wpm">0</span></span>
        <span>🎯 Accuracy: <span id="accuracy">100</span>%</span>
    </div>

    <div id="sentence" class="sentence"></div>

    <input type="text" id="input" placeholder="Start typing..." autofocus>

    <div id="progress"></div>

</div>

<div id="popup" class="popup hidden">
    <h2>🎉 Goal Completed!</h2>
    <p>Great job! Come back tomorrow 🔥</p>
    <button onclick="goDashboard()">Back</button>
</div>

<script src="script.js"></script>
</body>
</html>

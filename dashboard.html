<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <header class="header">
    <h1>⌨️ Typing Trainer</h1>
    <div class="user-box">👤 <span id="userName"></span></div>
  </header>

  <main class="main">

    <div class="card stats-card">
      <div><p>WPM</p><h2 id="wpm">0</h2></div>
      <div><p>Accuracy</p><h2 id="accuracy">100%</h2></div>
      <div><p>🔥 Streak</p><h2 id="streak">0</h2></div>
    </div>

    <div class="card progress-card">
      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <div class="card typing-card">
      <div id="sentence" class="sentence-box"></div>
      <input type="text" id="input" placeholder="Start typing..." autocomplete="off">
    </div>

    <div class="card controls-card">
      <button onclick="startApp()">Restart</button>
      <button onclick="logout()">Logout</button>
    </div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>

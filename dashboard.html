<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="container">

<header>
    <h2 id="welcome"></h2>
    <button onclick="toggleTheme()">Toggle Theme</button>
</header>

<div class="grid">

<div class="card">
    <h3>🔥 Streak</h3>
    <p id="streak">0 days</p>
</div>

<div class="card">
    <h3>🎯 Daily Goal</h3>
    <select id="goal">
        <option value="5">5 sentences</option>
        <option value="10">10 sentences</option>
        <option value="15">15 sentences</option>
    </select>
    <button onclick="saveGoal()">Save</button>
</div>

<div class="card">
    <h3>💬 Motivation</h3>
    <p id="quote"></p>
</div>

<div class="card big">
    <h3>🚀 Start Practice</h3>
    <button onclick="goPractice()">Start Now</button>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMaster | Glassmorphism Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="bubble-container" id="bubbles"></div>

    <audio id="key-sound" src="https://www.soundjay.com/communication/typewriter-key-1.mp3"></audio>
    <audio id="success-sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <nav class="glass-nav">
        <div class="logo">TypeMaster ⚡</div>
        <button id="theme-toggle" class="theme-btn-styled">☀️ Light Mode</button>
    </nav>

    <main id="dashboard" class="page active">
        <div class="glass-card hero-tile">
            <h1>TypeMaster</h1>
            <p>Elevate your speed with a frosted glass experience.</p>
            <div class="emoji-container">
                <span class="floating-emoji">🚀</span>
                <span class="floating-emoji">⌨️</span>
            </div>
            <button class="btn-primary" onclick="navigateTo('practice')">Start Practice</button>
        </div>
    </main>

    <main id="practice" class="page">
        <div class="practice-container">
            <div class="stats-grid">
                <div class="glass-card stat-tile">
                    <span class="label">TIME</span>
                    <span id="timer" class="value">0</span>
                </div>
                <div class="glass-card stat-tile">
                    <span class="label">WPM</span>
                    <span id="wpm" class="value">0</span>
                </div>
                <div class="glass-card stat-tile">
                    <span class="label">ACCURACY</span>
                    <span id="accuracy" class="value">100</span><small>%</small>
                </div>
            </div>

            <div class="glass-card main-typing-box">
                <div id="text-display" class="sentence-display"></div>
                <div class="input-wrapper">
                    <input type="text" id="typing-input" placeholder="Type the text above..." autocomplete="off">
                </div>
            </div>
            
            <button class="btn-ghost" onclick="navigateTo('dashboard')">Exit to Dashboard</button>
        </div>
    </main>

    <div id="modal-overlay" class="modal hidden">
        <div class="glass-card modal-box">
            <div class="modal-header">
                <span class="emoji-lg">🎊</span>
                <h2>Results</h2>
            </div>
            <div id="final-results" class="results-content"></div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="resetTest()">Try Again</button>
                <button class="btn-primary btn-alt" onclick="navigateTo('dashboard')">Dashboard</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

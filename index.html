<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TypeFlow | Precision Glass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="bubble-container" id="bubbles"></div>

    <nav class="glass-nav">
        <div class="nav-content">
            <div class="logo-container">
                <span class="logo-text">TypeFlow</span>
                <span class="logo-bolt">⚡</span>
            </div>
            <button id="theme-toggle" class="theme-btn-styled">☀️ Light Mode</button>
        </div>
    </nav>

    <div class="main-wrapper">
        <main id="dashboard" class="page active">
            <div class="hero-card glass-card">
                <div class="hero-emoji-top">🚀 ⌨️ 🎯</div>
                <h1 class="gradient-text">TypeFlow</h1>
                <button class="btn-primary pulse" onclick="navigateTo('practice')">Start Practice ⚡</button>
            </div>
        </main>

        <main id="practice" class="page">
            <div class="practice-layout">
                <div class="stats-grid">
                    <div class="glass-card stat-tile">
                        <span class="label">TIME</span>
                        <span id="timer" class="value">0</span>
                    </div>
                    <div class="glass-card stat-tile">
                        <span class="label">WPM</span>
                        <span id="wpm" class="value">0</span>
                    </div>
                    <div class="glass-card stat-tile">
                        <span class="label">ACCURACY</span>
                        <div class="acc-wrapper"><span id="accuracy" class="value">100</span><span class="unit">%</span></div>
                    </div>
                </div>

                <div class="glass-card main-typing-box">
                    <div id="text-display" class="sentence-display"></div>
                    <input type="text" id="typing-input" placeholder="Start typing..." autocomplete="off">
                </div>
                
                <div class="exit-container">
                    <button class="exit-tile hover-glow" onclick="navigateTo('dashboard')">
                        Exit to Dashboard 🏠
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
